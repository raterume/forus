<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.3.0/dist/vuetify.min.css" rel="stylesheet">
</head>
<body>
    <div id="app"> 
    <v-app>
        <v-main>
            <v-container>  

        <github-user-card username="raterume"></github-user-card>
    
            </v-container>
        </v-main>
    </v-app>
    </div>

        <script type = "text/x-template" id="github-user-card-template">    

                    <v-card class="mx-auto mt-5" max-width="400" variant="outlined">
                        <v-img
                            :src="user.avatar_url"
                            aspect-ratio="1"
                            cover
                            class="align-end text-white"></v-img>
                        
                        <v-card-title>{{user.name}}</v-card-title>
                        <v-card-title><a :href = "user.html_url">{{user.login}}</a></v-card-title>
                        
                        <v-card-subtitle>Зарегестрирован(а) {{user.created_at}}</v-card-subtitle>
                        
                        <v-card-text>
                            {{user.bio}}
                        </v-card-text>
                        
                        <v-card-actions>
                            <v-btn
                                variant="text"
                                size="small"
                                color="primary"
                                :href = `https://github.com/${username}?tab=followers`>
                                {{user.followers}} подписчиков
                            </v-btn>
                            <v-btn
                                variant="text"
                                size="small"
                                color="primary"
                                :href = `https://github.com/${username}?tab=repositories`>
                                {{user.public_repos}} репозитории
                            </v-btn>
                        </v-card-actions>
                    </v-card>
    </script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.3.0/dist/vuetify.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
     <script>
        Vue.createApp({})
        .component('github-user-card',{
            props:{
                username: {type: String, required: true}
            },
            template: '#github-user-card-template',
            data(){
                return{
                    user: {}
                }
            },
            async created(){
                const response = await axios.get(`https://api.github.com/users/${this.username}`)
                this.user = response.data
            }
        })
        .use(Vuetify.createVuetify())
        .mount('#app')
     </script>

</body>
</html>
