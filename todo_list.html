<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <Link rel ="stylesheet" href="main.css">
</head>
<body>

    <div id="todo-list">
        <div class="header">
            <h1>{{ header }}</h1>
            <button v-if="editing" @click="doEdit(false)" class="cancel">-</button>
            <button v-else @click="doEdit(true)" class="add-item">+</button>
        </div>
        

    <div v-if="editing">
        <input @keyup.enter="saveItem" v-model="newItem" type="text" placeholder="добавить..."> 
        <p class="counter">{{charCount}}/200</p>
        <label>
            <input type="checkbox" v-model="newItemHighPriority"> важно
        </label>
        <button v-bind:disabled="newItem.length === 0" @click="saveItem">добавить</button>
    </div>



        <p v-if="items.length === 0">пусто</p>
        <ul>
            <li v-for = "item in reversedItems" :key="item.id"
            @click="togglePurchased(item)"
            :class="{strikeout: item.purchased, priority: item.highPriority}"> 
            {{ item.label }}</li>
        </ul>

    </div>
    
<script src="https://unpkg.com/vue@3"></script>
<script>
    const shoppingList = Vue.createApp({
        data(){
            return{
                header: "Список дел",
                editing : false,
                newItem: '',
                newItemHighPriority: false,
                items: [
                    {id: 1, label: "купить яблок", purchased: false, highPriority: false}, 
                    {id: 2, label: "помыть полы", purchased: true, highPriority: true}, 
                ]
            }
        },
        computed:{
            charCount(){
                return this.newItem.length
            },
            reversedItems(){
                return [...this.items].reverse()
            }
        },
        methods: {
            saveItem(){
                if (this.newItem.length > 0){
                    this.items.push({id: this.items.length +1, 
                                    label: this.newItem,
                                    highPriority: this.newItemHighPriority})
                    this.newItem = ''
                    this.newItemHighPriority = ''
                    }
            },
            doEdit (editing){
                this.editing = editing
                this.newItem = ''
                this.newItemHighPriority = ''
            },
            togglePurchased(item){
                item.purchased = !item.purchased
            }
        }
    })
    .mount('#todo-list')
</script>

</body>
</html>

    <!-- CSS -->
<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

#todo-list {
    max-width: 500px;
    margin: 0 auto;
    padding: 10px;
    border: solid 1px #999;
    border-radius: 8px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.header h1 {
    margin: 0;
}

button {
    background-color: #4CAF50;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
}
button.cancel {
    background-color: #f44336;
}
button:disabled {
    background-color: #cccccc;
    cursor: not-allowed;
}
input[type="text"] {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
    margin-bottom: 10px;
    font-size: 14px;
}
.counter {
    margin: 5px 0;
    color: #666;
    font-size: 12px;
}
label {
    display: inline-block;
    margin-right: 15px;
    color: #333;
    font-size: 14px;
}
ul {
    list-style: none;
    padding: 0;
}

li {
    padding: 10px;
    margin: 5px 0;
    cursor: pointer;
}
.strikeout {
    text-decoration: line-through;
    color: #999;
}
.strikeout.priority {
    text-decoration: line-through;
    color: #999;
}
.priority {
    color: #ffb300;
    font-weight: bold;
}
</style>
